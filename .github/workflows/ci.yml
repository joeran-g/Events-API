name: CI_events_api

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        run: docker buildx build --platform linux/amd64 --load -t events-api:latest .
      
      - name: Start container
        run: docker run -d -p 5000:5001 --name events-api events-api:latest
      
      - name: Wait for API to start
        run: sleep 5
      
      - name: Health check
        run: curl -f http://localhost:5000/api/health || exit 1

      - name: Install dependencies for model tests
        run: pip install -r requirements.txt

      - name: Run API tests
        run: |
          pip install requests
          pytest -v

      - name: Cleanup
        if: always()
        run: docker stop events-api && docker rm events-api


        deploy:
          needs: test
          if: success()
          runs-on: ubuntu-latest
          environment: production

          steps:
            - name: Check out code
              uses: actions/checkout@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
              username: ${{ secrets.DOCKERHUB_USERNAME }}
              password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

            - name: Build and push Docker image
              run: |
                docker buildx build --platform linux/amd64 \
                  --tag "${{ secrets.DOCKERHUB_USERNAME }}/events-api:latest" \
                  --push .

            - name: Trigger Render deploy hook
              run: |
                curl -X POST "${{ secrets.RENDER_BASE_URL }}${{ secrets.RENDER_DEPLOY_HOOK }}" \
                  -H "Content-Type: application/json"

            - name: Wait for Render deployment
              run: sleep 15

            - name: Health check for Render deployment
              run: |
                RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_BASE_URL }}/api/health")
                if [ "$RESPONSE" -ne 200 ]; then
                  echo "Health check failed with response code: $RESPONSE"
                  exit 1
                fi
