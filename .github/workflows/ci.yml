name: CI_events_api

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        run: docker build -t events-api:latest .
      
      - name: Start container
        run: docker run -d -p 5001:5001 --name events-api events-api:latest
      
      - name: Wait for API to start
        run: sleep 5
      
      - name: Health check
        run: curl -f http://localhost:5001/api/health || exit 1

      - name: Run API tests
        run: pytest -v

      - name: Install dependencies for model tests
        run: pip install -r requirements.txt

      - name: Cleanup
        if: always()
        run: docker stop events-api && docker rm events-api
